# Upload Studio - DTF Print Depot

client_id = "94e0821d228f811c278f3f9115c02717"
name = "UStudio DTF Print Depot"
application_url = "https://dtfprintdepot.uploadstudio.app.techifyboost.com"
embedded = true
handle = "dtfprintdepot"

[build]
automatically_update_urls_on_dev = false
dev_store_url = "h1s00r-21.myshopify.com"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products-delete"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products-update"

[access_scopes]
scopes = "read_customers,read_files,read_orders,read_products,write_draft_orders,write_files,write_orders,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://dtfprintdepot.uploadstudio.app.techifyboost.com/auth/callback",
  "https://dtfprintdepot.uploadstudio.app.techifyboost.com/api/auth/callback"
]

[app_proxy]
url = "https://dtfprintdepot.uploadstudio.app.techifyboost.com"
subpath = "customizer"
prefix = "apps"

[pos]
embedded = false
