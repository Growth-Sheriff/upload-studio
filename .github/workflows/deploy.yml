name: Build & Deploy Upload Studio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Pull, Build & Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            echo "=== [1/4] Sync Git Checkout ==="
            cd /opt/apps/custom/customizerapp/upload-studio/src
            git fetch --prune origin main
            git checkout -f main
            git reset --hard origin/main
            echo "Deployed commit: $(git rev-parse HEAD)"

            echo "=== [2/4] Docker Build ==="
            sudo docker build -t upload-studio:latest .

            echo "=== [3/4] Restart Containers ==="
            cd /opt/apps/custom/customizerapp/upload-studio
            sudo docker compose down
            sudo docker compose up -d

            echo "=== [4/4] Health Check (retry 3x) ==="
            for attempt in 1 2 3; do
              echo "Attempt $attempt - waiting 90s..."
              sleep 90
              FAILED=0
              for name in fastdtftransfer everydaycustomprint dtftransferohio dtfprinthouse dtfprintdepot eagledtfprint alphaprint gangsheet legendtransfers customprintaz; do
                port=$(sudo docker port us-$name 3000/tcp 2>/dev/null | cut -d: -f2)
                code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:$port/health 2>/dev/null)
                echo "$name (:$port): $code"
                if [ "$code" != "200" ]; then
                  FAILED=$((FAILED+1))
                fi
              done
              if [ $FAILED -eq 0 ]; then
                echo "All 10 tenants healthy!"
                exit 0
              fi
              echo "$FAILED tenant(s) not ready yet..."
            done
            echo "Some tenants failed after 3 attempts"
            exit 1

