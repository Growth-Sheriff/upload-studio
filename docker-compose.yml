# ============================================
# Upload Studio - Multi-Tenant Docker Compose
# 11 Tenants + Shared Redis
# ============================================
# Usage:
#   docker build -t upload-studio:latest .
#   docker compose up -d
#
# Each tenant runs in its own container with:
#   - Remix app server
#   - 4 background workers (preflight, export, flow, commission)
#   - Its own Redis DB index (0-10)
#   - Its own PostgreSQL schema
#
# Env files must exist at envs/.env.{slug} before starting.
# Generate them with: bash scripts/generate-tenant-envs.sh
# ============================================

x-app-common: &app-common
  image: upload-studio:latest
  restart: unless-stopped
  networks:
    - appnet

services:

  # ════════════════════════════════════════════
  # TENANT 1: Fast DTF Transfer
  # ════════════════════════════════════════════
  fastdtftransfer:
    <<: *app-common
    container_name: us-fastdtftransfer
    env_file: envs/.env.fastdtftransfer
    ports:
      - "127.0.0.1:4101:3000"
    volumes:
      - uploads-fastdtftransfer:/app/uploads

  # ════════════════════════════════════════════
  # TENANT 2: Everyday Custom Print
  # ════════════════════════════════════════════
  everydaycustomprint:
    <<: *app-common
    container_name: us-everydaycustomprint
    env_file: envs/.env.everydaycustomprint
    ports:
      - "127.0.0.1:4102:3000"
    volumes:
      - uploads-everydaycustomprint:/app/uploads

  # ════════════════════════════════════════════
  # TENANT 3: DTF Transfer Ohio
  # ════════════════════════════════════════════
