    ports:
      - "127.0.0.1:4110:3000"
    volumes:
      - uploads-customprintaz:/app/uploads

  # ════════════════════════════════════════════
  # TENANT 11: DTF Print Arizona (DISABLED - şimdilik kapalı)
  # ════════════════════════════════════════════
  # dtfprintarizona:
  #   <<: *app-common
  #   container_name: us-dtfprintarizona
  #   env_file: envs/.env.dtfprintarizona
  #   ports:
  #     - "127.0.0.1:4011:3000"
  #   volumes:
  #     - uploads-dtfprintarizona:/app/uploads

# ════════════════════════════════════════════
# VOLUMES
# ════════════════════════════════════════════
volumes:
  uploads-fastdtftransfer:
    name: us-uploads-fastdtftransfer
  uploads-everydaycustomprint:
    name: us-uploads-everydaycustomprint
  uploads-dtftransferohio:
    name: us-uploads-dtftransferohio
  uploads-dtfprinthouse:
    name: us-uploads-dtfprinthouse
  uploads-dtfprintdepot:
    name: us-uploads-dtfprintdepot
  uploads-eagledtfprint:
    name: us-uploads-eagledtfprint
  uploads-alphaprint:
    name: us-uploads-alphaprint
  uploads-gangsheet:
    name: us-uploads-gangsheet
  uploads-legendtransfers:
    name: us-uploads-legendtransfers
  uploads-customprintaz:
    name: us-uploads-customprintaz
  uploads-dtfprintarizona:
    name: us-uploads-dtfprintarizona

# ════════════════════════════════════════════
# NETWORKS
# ════════════════════════════════════════════
networks:
  appnet:
    external: true
