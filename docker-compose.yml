    <<: *app-common
    container_name: us-alphaprint
    env_file: envs/.env.alphaprint
    ports:
      - "127.0.0.1:4107:3000"
    volumes:
      - uploads-alphaprint:/app/uploads

  # ════════════════════════════════════════════
  # TENANT 8: Gang Sheet
  # ════════════════════════════════════════════
