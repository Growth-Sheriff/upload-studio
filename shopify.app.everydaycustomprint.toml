# Upload Studio - Everyday Custom Print

client_id = "de9c001f493945c1c3b080dcc75e6af6"
name = "UStudio Everyday Custom Print"
application_url = "https://everydaycustomprint.uploadstudio.app.techifyboost.com"
embedded = true
handle = "everydaycustomprint"

[build]
automatically_update_urls_on_dev = false
dev_store_url = "everyday-custom-print.myshopify.com"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products-delete"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products-update"

[access_scopes]
scopes = "read_customers,read_files,read_orders,read_products,write_files,write_orders,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://everydaycustomprint.uploadstudio.app.techifyboost.com/auth/callback",
  "https://everydaycustomprint.uploadstudio.app.techifyboost.com/api/auth/callback"
]

[app_proxy]
url = "https://everydaycustomprint.uploadstudio.app.techifyboost.com"
subpath = "customizer"
prefix = "apps"

[pos]
embedded = false
