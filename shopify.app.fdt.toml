# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f122b497901d3db350a2c20b7ce4bc2d"
name = "Upload Studio"
application_url = "https://fastdtftransfer.uploadstudio.app.techifyboost.com"
embedded = true
handle = "fast-dtf-transfer"

[build]
automatically_update_urls_on_dev = false
dev_store_url = "fast-dtf-transfer.myshopify.com"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products-delete"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products-update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_files,read_orders,read_products,write_files,write_orders,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://fastdtftransfer.uploadstudio.app.techifyboost.com/auth/callback",
  "https://fastdtftransfer.uploadstudio.app.techifyboost.com/api/auth/callback"
]

[app_proxy]
url = "https://fastdtftransfer.uploadstudio.app.techifyboost.com"
subpath = "customizer"
prefix = "apps"

[pos]
embedded = false
